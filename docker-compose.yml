services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: familytree
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
    restart: always
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgrespassword@db:5432/familytree
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cf_tunnel_container
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=eyJhIjoiYmE3YTE4NDE3ODNjMzIzOTNhN2RiOWMzNzA3NDViYjIiLCJ0IjoiMGVjMjA1YTYtN2Y4MS00MGJmLTgyOWQtNmExZDUwYzE3NDliIiwicyI6Ik1UTTNOREV5TkdVdE5XVTBPUzAwTWpabUxXRmhOMlF0TmpFellqZGtaakpsWVdKbSJ9
volumes:
  pgdata:
